[polychord]
# CAR model — PolyChord nested sampling configuration
# Reference: Handley et al. (2015), MNRAS 450, L61

# Sampling settings
n_live          = 500      # Live points (500 gives Δln Z error ≈ ±0.04)
num_repeats     = 10       # Slice sampling repeats per live point
precision_criterion = 0.01 # Target evidence uncertainty
nprior          = 500      # Prior samples for initial exploration
do_clustering   = True     # Allow multi-modal posterior detection
feedback        = 1        # Verbosity (0=silent, 1=normal, 2=verbose)

# I/O
base_dir        = chains/output
file_root       = car
read_resume     = False
write_resume    = True
equals          = False    # Don't use equal-weight samples

[parameters]
# CAR has only 2 free parameters (all others are derived)
# Omega_m: flat prior [0.1, 0.5]
#   - Constrained primarily by CMB angular scale + BAO geometry
#   - Planck ΛCDM best-fit: 0.315 ± 0.007
Omega_m_min     = 0.10
Omega_m_max     = 0.50
Omega_m_prior   = uniform

# R_b: Gaussian prior from BBN (this is the key CAR input)
#   - BBN best-fit: 0.260 ± 0.002
#   - Prior is tight; posterior should be prior-dominated
R_b_min         = 0.240
R_b_max         = 0.280
R_b_prior       = gaussian
R_b_mean        = 0.260
R_b_sigma       = 0.002

[derived]
# These are computed deterministically from (Omega_m, R_b) via sct_core.py
r_d    = True    # Sound horizon [Mpc]
H0     = True    # Hubble constant [km/s/Mpc]
S8     = True    # Clustering amplitude
IA_bias = True   # Intrinsic alignment bias

[likelihood]
# Which survey likelihoods to include
desi_dr2_bao    = True
planck_pr4_cmb  = True
des_y6_3x2pt    = True
hsc_y3_wl       = True
kids_dr5_wl     = True

# Likelihood data paths (set to your data directory)
desi_data_path  = data/desi_dr2_bao.hdf5
des_data_path   = data/des_y6_3x2pt.hdf5
hsc_data_path   = data/hsc_y3_wl.hdf5
kids_data_path  = data/kids_dr5_wl.hdf5
planck_data_path = data/planck_pr4_compressed.hdf5

[expected_results]
# Paper results for verification
log_Z           = -1248.52
log_Z_err       = 0.04
delta_lnB_LCDM  = -1.20      # DESI+Planck only
delta_lnB_combined = -3.80   # Conservative combined
odds_conservative = 44        # :1 in favour of CAR
