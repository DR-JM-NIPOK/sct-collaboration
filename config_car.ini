; config_car.ini - PolyChord configuration for CAR model
; Successive Collision Theory Cosmology Series

[polychord]
n_live = 500
num_repeats = 10
n_derived = 0
feedback = 1
precision_criterion = 0.01
base_dir = chains/output
file_root = car

[prior]
; CAR has 2 free parameters: Omega_m and R_b
; Omega_m: total matter density
; R_b: DERIVED CONSTANT — Paper 17 v4.0 Section 11.6 (DO NOT SAMPLE)
; R_b = 0.257 +/- 0.032 derived from SO(3) cascade + QCD junction conditions
; CAR now has 1 free parameter (Omega_m). R_b is not sampled.
Omega_m = uniform 0.1 0.5
; R_b = fixed 0.257  (derived constant — see R_B_DERIVED in sct_core.py)

[likelihood]
; Combined likelihood for all datasets
data = combined
loglike = car_loglike

[posterior]
; Derived parameters from CAR
r_d = derived
H0 = derived
S8 = derived
IA_bias = derived