[polychord]
# ΛCDM model — PolyChord configuration (for model comparison with CAR)
n_live          = 500
num_repeats     = 10
precision_criterion = 0.01
feedback        = 1
base_dir        = chains/output
file_root       = lcdm
read_resume     = False
write_resume    = True

[parameters]
# Standard 6 cosmological parameters
Omega_b_h2_min  = 0.018
Omega_b_h2_max  = 0.025
Omega_c_h2_min  = 0.10
Omega_c_h2_max  = 0.14
100theta_s_min  = 1.02
100theta_s_max  = 1.05
tau_min         = 0.01
tau_max         = 0.08
ln_10_10_As_min = 2.8
ln_10_10_As_max = 3.2
n_s_min         = 0.90
n_s_max         = 1.10

[nuisance]
# 42 nuisance parameters across the four surveys
# Intrinsic Alignment (NLA model, 3 per survey = 12 total)
A_IA_des        = True
eta_IA_des      = True
z0_IA_des       = True
A_IA_hsc        = True
eta_IA_hsc      = True
z0_IA_hsc       = True
A_IA_kids       = True
eta_IA_kids     = True
z0_IA_kids      = True

# Photometric redshift shifts (5 bins × 3 surveys = 15 total)
dz1_des = True
dz2_des = True
dz3_des = True
dz4_des = True
dz5_des = True
dz1_hsc = True
dz2_hsc = True
dz3_hsc = True
dz4_hsc = True
dz1_kids = True
dz2_kids = True
dz3_kids = True
dz4_kids = True
dz5_kids = True

# Baryonic feedback (1 per survey = 3 total)
A_bary_des  = True
A_bary_hsc  = True
A_bary_kids = True

# Shear calibration (5 bins × 3 surveys = 15, minus redundant = 9 effective)
m1_des = True
m2_des = True
m3_des = True
m1_hsc = True
m2_hsc = True
m3_hsc = True
m1_kids = True
m2_kids = True
m3_kids = True

[expected_results]
# ΛCDM reference values
log_Z           = -1247.32
log_Z_err       = 0.03
chi2_combined   = 2498.0
dof_combined    = 2532
